name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Verifier la syntaxe de tous les scripts
        run: |
          for f in scripts/*.sh lib/*.sh; do
            bash -n "$f"
          done

      - name: Lancer ShellCheck
        run: shellcheck scripts/*.sh lib/*.sh

  tests:
    name: Tests bats
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Installer bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Lancer les tests
        run: |
          for f in tests/*.bats; do
            bats "$f"
          done

  security-scan:
    name: Scan de secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
